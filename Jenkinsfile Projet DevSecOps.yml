pipeline {
    agent any

    tools {
        maven 'Maven-3.9'
    }

    parameters {
        string(name: 'NAME', description: 'Please tell me your name?')
        booleanParam(name: 'RUN_TRIVY', defaultValue: true, description: 'Exécuter le scan Trivy')
        booleanParam(name: 'RUN_SNYK', defaultValue: false, description: 'Exécuter ou pas le scan Snyk')
        booleanParam(name: 'SKIP_TEST', defaultValue: false, description: 'Skip running Tests ?')
        text(name: 'DESC', defaultValue: 'Pipeline CI/CD Jenkins GitHub', description: 'Description du Job')
        choice(name: 'BRANCH', choices: ['main', 'dev', 'test'], description: 'Choose Git branch')
    }

    environment {
        APP_NAME = "product-api-devsecops"
        DOCKER_IMAGE = "alexis/product-api-devsecops"
        GITHUB_REPO = "https://github.com/DamienAlessandrin/Projet-DevSecOps-E5.git"
        TRIVY_EXE = "C:\\ProgramData\\chocolatey\\bin\\trivy.exe" 
        SNYK_EXE = "C:\\ProgramData\\chocolatey\\bin\\snyk.exe"
    }

    stages {
        stage('01 - PRINT PARAMETERS') {
            steps {
                echo "Hello ${params.NAME}"
                echo "Description: ${params.DESC}"
                echo "Branch Selected : ${params.BRANCH}"
                echo "Skip Test: ${params.SKIP_TEST}"
            }
        }

        stage('02 - CHECK TOOLS') { 
            steps { 
                bat """         
                echo ===== MAVEN ===== 
                mvn -version                           
                echo ===== DOCKER ===== 
                docker --version                           
                echo ===== TRIVY ===== 
                "%TRIVY_EXE%" --version 
                echo ===== SNYK ===== 
                "%SNYK_EXE%" --version
                """
            }
        }

        stage('03 - CHECKOUT GITHUB') {
            steps {
                echo "Downloading source code..."
                git branch: "${params.BRANCH}",
                url: "${GITHUB_REPO}"
            }
        }

        stage('04 - BUILD APPLICATION') {
            steps {
                echo "Building Application"
                bat """
                echo Compilation en cours...
                mvn clean package
                """
            }
        }

        stage('05 - RUN TESTS') {
            when {
                expression { return params.SKIP_TEST == false }
            }
            steps {
                echo "Running Tests"
                bat """
                mvn test
                """
            }
        }

        stage('06 - DOCKER BUILD') {
            steps {
                echo "Creating Docker image"
                bat """
                docker build -t ${DOCKER_IMAGE}:latest .
                """
            }
        }

        stage('07 - TRIVY SECURITY SCAN') {
            when {
                expression { params.RUN_TRIVY }
            }
            steps {
                bat """
                trivy image ^
                --severity HIGH,CRITICAL ^
                ${DOCKER_IMAGE}:latest ^
                """
            }
        }

        stage('08 - SNYK DEPENDENCY SCAN') {
            when {
                expression { params.RUN_SNYK }
            }
            steps {
                withCredentials([
                    string(
                        credentialsId: 'snyk-token',
                        variable: 'SNYK_TOKEN'
                    )
                ]) {
                    bat """
                    snyk auth %SNYK_TOKEN%
                    snyk test --file=pom.xml || exit 0
                    """
                }
            }
        }

        stage('09 - DEPLOY DOCKER') {
            steps {

                bat """
                docker stop ${APP_NAME}  echo 'Conteneur non existant'
                docker rm ${APP_NAME}  echo 'Rien à supprimer'
                docker run -d ^
                --name ${APP_NAME} ^
                -p 8081:8080 ^
                ${env.DOCKER_IMAGE}
                """
            }
        }
        
        stage('10 - HEALTH CHECK') {
            steps {
                bat """
                echo Waiting for server...
                ping 127.0.0.1 -n 15 > nul
                echo Testing health endpoint...
                curl -f http://localhost:8081/health
                """
            }
        }
    }

    post {

        success {
            echo 'Pipeline DevSecOps terminé avec succès.'
        }

        failure {
            echo 'Le pipeline a échoué.'
        }

        always {
            cleanWs()
        }
    }
}
