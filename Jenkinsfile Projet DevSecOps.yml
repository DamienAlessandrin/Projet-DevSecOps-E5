pipeline {
    agent any

    tools {
        maven 'Maven-3.9'
    }

    parameters {
        booleanParam(
            name: 'RUN_TRIVY',
            defaultValue: true,
            description: 'Exécuter le scan Trivy'
        )

        booleanParam(
            name: 'RUN_SNYK',
            defaultValue: true,
            description: 'Exécuter le scan Snyk'
        )
    }

    environment {
        IMAGE_NAME = "product-api-devsecops"
        CONTAINER_NAME = "product-api-devsecops"
    }

    stages {
        stage('01 - PRINT PARAMETERS') {
            steps {
                echo "Hello ${params.NAME}"
                echo "Description: ${params.DESC}"
                echo "Branch Selected : ${params.BRANCH}"
                echo "Skip Test: ${params.SKIP_TEST}"
            }
        }

        stage('02 - CHECK TOOLS') { 
            steps { 
                bat """         
                echo ===== MAVEN ===== 
                mvn -version                           
                echo ===== DOCKER ===== 
                docker --version                           
                echo ===== TRIVY ===== 
                "%TRIVY_EXE%" --version 
                echo ===== SNYK ===== 
                "%SNYK_EXE%" --version
                """
            }
        }

        stage('03 - CHECKOUT GITHUB') {
            steps {
                echo "Downloading source code..."
                git branch: "${params.BRANCH}",
                url: "${GITHUB_REPO}"
            }
        }

        stage('04 - BUILD APPLICATION') {
            steps {
                echo "Building Application"
                bat """
                echo Compilation en cours...
                mvn clean package -DskipTests=true
                """
            }
        }

        stage('05 - RUN TESTS') {
            when {
                expression { return params.SKIP_TEST == false }
            }
            steps {
                echo "Running Tests"
                bat """
                mvn test
                """
            }
        }

        stage('06 - DOCKER BUILD') {
            steps {
                echo "Creating Docker image"
                bat """
                docker build -t ${DOCKER_IMAGE}:latest .
                """
            }
        }

        stage('07 - TRIVY SECURITY SCAN') {
            when {
                expression { params.RUN_TRIVY }
            }
            steps {
                bat '''
                trivy image ^
                --severity HIGH,CRITICAL ^
                --format table ^
                -o trivy-report.txt ^
                %IMAGE_NAME%
                '''
            }
        }

        stage('08 - ARCHIVE TRIVY REPORT') {
            when {
                expression { params.RUN_TRIVY }
            }
            steps {
                archiveArtifacts artifacts: 'trivy-report.txt'
            }
        }

        stage('09 - SNYK DEPENDENCY SCAN') {
            when {
                expression { params.RUN_SNYK }
            }
            steps {
                withCredentials([
                    string(
                        credentialsId: 'snyk-token',
                        variable: 'SNYK_TOKEN'
                    )
                ]) {

                    bat '''
                    snyk auth %SNYK_TOKEN%
                    snyk test --file=pom.xml
                    '''
                }
            }
        }

        stage('10 - DEPLOY DOCKER') {
            steps {

                bat '''
                docker rm -f %CONTAINER_NAME% 2>NUL
                '''

                bat '''
                docker run -d ^
                --name %CONTAINER_NAME% ^
                -p 8081:8080 ^
                %IMAGE_NAME%
                '''
            }
        }

        # stage('11 - HEALTH CHECK') {
        #     steps {
        #         bat '''
        #         timeout /t 15
        #         curl http://localhost:8081/health
        #         '''
        #     }
        # }
    }

    post {

        success {
            echo 'Pipeline DevSecOps terminé avec succès.'
        }

        failure {
            echo 'Le pipeline a échoué.'
        }

        always {
            cleanWs()
        }
    }
}
